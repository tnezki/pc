<!-- ============================================================
     PRECALCULUS — STUDENT INDEX
     File: index.html
     Hosted at: tnezki.github.io/pctextbook/index.html

     STRUCTURE OVERVIEW
     ------------------
     1. <head>             Fonts, styles
     2. .page-header       Title and subtitle
     3. .resources-bar     Quick-link chips (top of page)
     4. #units             Populated by JavaScript below

     TO EDIT A LINK
     --------------
     Find the unit/section in the `units` array in the
     <script> block. Change the `href` value for that item.

     TO ADD A RESOURCE TO THE TOP BAR
     ---------------------------------
     Find the "TOP RESOURCES BAR" section in <body>.
     Copy any <a> tag and paste a new one below it.

     TO RENAME A RESOURCE (e.g. Activity 1 → Discovery Lab)
     --------------------------------------------------------
     Find the section's `resources` array and change the
     `label` field for that item.

     TO ADD A NEW SECTION RESOURCE
     ------------------------------
     Add a new object to the section's `resources` array:
       { label: "My New Thing", cls: "", icon: "ti-file", href: "https://..." }

     TO ADD A WHOLE NEW UNIT
     ------------------------
     Copy any unit object (from the opening { to the }, )
     and paste it in the correct position in the units array.
     ============================================================ -->

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precalculus — Manistee High School</title>

    <!-- Tabler Icons (outline webfont) -->

        rel="stylesheet"

    >

    <style>

        /* --------------------------------------------------------
           CUSTOM PROPERTIES
           Edit colors here — changes cascade everywhere.
           -------------------------------------------------------- */
        :root {
            --navy:       #1F3864;
            --gold:       #C9A84C;
            --gold-light: #F5EDD5;
            --gold-mid:   #e8d49a;

            --text:       #1a1a1a;
            --text-muted: #555555;
            --border:     #dddddd;
            --bg:         #ffffff;
            --bg-subtle:  #f7f7f5;
        }


        /* --------------------------------------------------------
           RESET & BASE
           -------------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: var(--bg-subtle);
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
        }


        /* --------------------------------------------------------
           PAGE LAYOUT
           -------------------------------------------------------- */
        .page-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }


        /* --------------------------------------------------------
           PAGE HEADER
           -------------------------------------------------------- */
        .page-header {
            border-bottom: 3px solid var(--navy);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 26px;
            font-weight: normal;
            color: var(--navy);
            letter-spacing: -0.3px;
        }

        .page-subtitle {
            font-size: 13px;
            font-family: Arial, sans-serif;
            color: var(--text-muted);
            margin-top: 4px;
        }


        /* --------------------------------------------------------
           TOP RESOURCES BAR
           The gold strip with quick-link chips.
           -------------------------------------------------------- */
        .resources-bar {
            background: var(--gold-light);
            border-left: 4px solid var(--gold);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 2rem;
        }

        .resources-bar-label {
            font-size: 11px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #7a6020;
            margin-bottom: 8px;
        }

        .resources-bar-links {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .res-chip {
            font-size: 12px;
            font-family: Arial, sans-serif;
            color: var(--navy);
            text-decoration: none;
            background: white;
            padding: 4px 11px;
            border-radius: 20px;
            border: 1px solid var(--gold-mid);
        }

        .res-chip:hover {
            background: var(--gold-mid);
        }


        /* --------------------------------------------------------
           UNIT BLOCK
           One of these wraps each unit (header + sections).
           -------------------------------------------------------- */
        .unit-block {
            margin-bottom: 2.5rem;
        }

        /* Navy title bar — clicking this opens/closes the unit */
        .unit-header {
            background: var(--navy);
            border-radius: 6px 6px 0 0;
            padding: 0.65rem 1rem;
            display: flex;
            align-items: baseline;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .unit-header:hover {
            background: #26447a;
        }

        /* Small all-caps gold label, e.g. "UNIT 01" */
        .unit-label {
            font-size: 11px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--gold);
            white-space: nowrap;
        }

        /* Full unit title in white */
        .unit-name {
            font-size: 16px;
            font-family: Georgia, serif;
            color: white;
            font-weight: normal;
            flex: 1;
        }

        /* Chevron rotates when unit is open */
        .unit-chevron {
            font-size: 15px;
            color: var(--gold);
            transition: transform 0.18s;
            flex-shrink: 0;
        }

        .unit-chevron.open {
            transform: rotate(180deg);
        }

        /* Everything inside the unit that collapses */
        .unit-collapsible {
            display: none;
        }

        .unit-collapsible.open {
            display: block;
        }

        /* Light blue strip with unit-level links (Outline, etc.) */
        .unit-meta {
            background: #f0f3f8;
            border-left: 1px solid #c5cfe0;
            border-right: 1px solid #c5cfe0;
            padding: 0.6rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .unit-meta-chip {
            font-size: 12px;
            font-family: Arial, sans-serif;
            color: var(--navy);
            text-decoration: none;
            padding: 3px 10px;
            border-radius: 20px;
            background: white;
            border: 1px solid #b8c5d8;
        }

        .unit-meta-chip:hover {
            background: #dce6f5;
        }

        /* Container for all section rows */
        .unit-body {
            border: 1px solid #c5cfe0;
            border-top: none;
            border-radius: 0 0 6px 6px;
            overflow: hidden;
        }


        /* --------------------------------------------------------
           SECTION ROWS
           One row per section inside a unit.
           -------------------------------------------------------- */
        .section-row {
            border-top: 1px solid var(--border);
        }

        .section-row:first-child {
            border-top: none;
        }

        /* Clickable row that toggles the resource buttons */
        .section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.55rem 1rem;
            background: var(--bg-subtle);
            cursor: pointer;
            user-select: none;
        }

        .section-head:hover {
            background: #eef1f7;
        }

        /* Section number badge, e.g. "1.3" */
        .section-num {
            font-size: 11px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            color: var(--gold);
            background: var(--navy);
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .section-title {
            font-size: 13px;
            font-family: Arial, sans-serif;
            color: var(--text);
            flex: 1;
        }

        /* Chevron rotates when section is open */
        .section-chevron {
            font-size: 14px;
            color: var(--text-muted);
            transition: transform 0.18s;
            flex-shrink: 0;
        }

        .section-chevron.open {
            transform: rotate(180deg);
        }

        /* Resource button row — hidden until section is clicked */
        .section-body {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0.6rem 1rem 0.75rem;
            background: white;
            border-top: 1px solid var(--border);
        }

        .section-body.open {
            display: flex;
        }


        /* --------------------------------------------------------
           RESOURCE BUTTONS
           The pill-shaped links inside each section.
           -------------------------------------------------------- */
        .r-btn {
            font-size: 12px;
            font-family: Arial, sans-serif;
            text-decoration: none;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: var(--bg-subtle);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .r-btn:hover {
            border-color: var(--navy);
            color: var(--navy);
        }

        /* Notes and Practice Set get a slightly stronger style */
        .r-btn.primary {
            border-color: #b8c5d8;
            color: var(--navy);
            background: #f0f3f8;
            font-weight: bold;
        }

        .r-btn.primary:hover {
            background: #dce6f5;
        }

        .r-btn i {
            font-size: 13px;
        }

</head>

    // ------------------------------------------------------------
    // buildUnit(u)
    // Returns a <div class="unit-block"> DOM element for one unit.
    // ------------------------------------------------------------
    function buildUnit(u) {

        // Build the unit-level meta chips (Outline, Progress Tracker, etc.)
        const metaHTML = u.meta
            .map(function(m) {
                return (
                    '<a href="' + m.href + '" class="unit-meta-chip" target="_blank">' +
                        m.label +
                    '</a>'
                );
            })
            .join('\n            ');

        // Build all section rows
        const sectionsHTML = u.sections
            .map(function(sec, i) {
                return buildSection(u.id, i + 1, sec);
            })
            .join('\n');

        // Assemble and return the block element
        const block = document.createElement('div');
        block.className = 'unit-block';

        block.innerHTML =

            '<div class="unit-header" onclick="toggleUnit(this)">' +
                '<span class="unit-label">' + u.label + '</span>' +
                '<span class="unit-name">'  + u.name  + '</span>' +
                '<i class="ti ti-chevron-down unit-chevron" aria-hidden="true"></i>' +
            '</div>' +

            '<div class="unit-collapsible">' +

                '<div class="unit-meta">' +
                    metaHTML +
                '</div>' +

                '<div class="unit-body">' +
                    sectionsHTML +
                '</div>' +

            '</div>';

        return block;
    }


    // ------------------------------------------------------------
    // buildSection(unitId, index, sec)
    // Returns the HTML string for one section row.
    // ------------------------------------------------------------
    function buildSection(unitId, index, sec) {

        const num = unitId + '.' + index;

        // Build resource buttons
        const buttonsHTML = sec.resources
            .map(function(r) {
                return (
                    '<a href="' + r.href + '" class="r-btn ' + r.cls + '" target="_blank">' +
                        '<i class="ti ' + r.icon + '" aria-hidden="true"></i>' +
                        r.label +
                    '</a>'
                );
            })
            .join('\n                ');

        return (
            '<div class="section-row">' +

                '<div class="section-head" onclick="toggleSection(this)">' +
                    '<span class="section-num">'   + num      + '</span>' +
                    '<span class="section-title">' + sec.title + '</span>' +
                    '<i class="ti ti-chevron-down section-chevron" aria-hidden="true"></i>' +
                '</div>' +

                '<div class="section-body">' +
                    buttonsHTML +
                '</div>' +

            '</div>'
        );
    }


    // ------------------------------------------------------------
    // toggleUnit(header)
    // Opens or closes a unit's collapsible content area.
    // ------------------------------------------------------------
    function toggleUnit(header) {

        const collapsible = header.nextElementSibling;
        const chevron     = header.querySelector('.unit-chevron');

        const isOpen = collapsible.classList.toggle('open');
        chevron.classList.toggle('open', isOpen);
    }


    // ------------------------------------------------------------
    // toggleSection(header)
    // Opens or closes a section's resource button row.
    // ------------------------------------------------------------
    function toggleSection(header) {

        const body    = header.nextElementSibling;
        const chevron = header.querySelector('.section-chevron');

        const isOpen = body.classList.toggle('open');
        chevron.classList.toggle('open', isOpen);
    }


    // ------------------------------------------------------------
    // INIT — inject all unit blocks into the page
    // ------------------------------------------------------------
    const container = document.getElementById('units');

    units.forEach(function(u) {
        container.appendChild(buildUnit(u));
    });
