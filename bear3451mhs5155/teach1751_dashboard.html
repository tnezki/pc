           CUSTOM PROPERTIES

           -------------------------------------------------------- */
        :root {

            --gold-light:     #F5EDD5;
            --gold-mid:       #e8d49a;

            --text:           #1a1a1a;
            --text-muted:     #555555;
            --border:         #dddddd;
            --bg:             #ffffff;
            --bg-subtle:      #f7f7f5;

            /* Teacher-only accent (green) */
            --teacher-dark:   #2d6a2d;
            --teacher-mid:    #b8d8b8;
            --teacher-light:  #eaf3ea;
        }


        /* --------------------------------------------------------
           RESET & BASE
           -------------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: var(--bg-subtle);
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
        }


        /* --------------------------------------------------------
           PAGE LAYOUT
           -------------------------------------------------------- */
        .page-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }


        /* --------------------------------------------------------
           TEACHER BANNER

           -------------------------------------------------------- */
        .teacher-banner {
            background: var(--teacher-dark);
            color: white;
            font-size: 11px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            padding: 6px;
            border-radius: 4px;
            margin-bottom: 1rem;
        }


        /* --------------------------------------------------------
           PAGE HEADER
           -------------------------------------------------------- */
        .page-header {
            border-bottom: 3px solid var(--navy);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 26px;
            font-weight: normal;
            color: var(--navy);
            letter-spacing: -0.3px;
        }

        .page-subtitle {
            font-size: 13px;
            font-family: Arial, sans-serif;
            color: var(--text-muted);
            margin-top: 4px;
        }


        /* --------------------------------------------------------
           TOP RESOURCES BAR
           The gold strip with quick-link chips.
           -------------------------------------------------------- */
        .resources-bar {
            background: var(--gold-light);
            border-left: 4px solid var(--gold);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 2rem;
        }

        .resources-bar-label {
            font-size: 11px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #7a6020;
            margin-bottom: 8px;
        }

        .resources-bar-links {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .res-chip {
            font-size: 12px;
            font-family: Arial, sans-serif;
            color: var(--navy);
            text-decoration: none;
            background: white;
            padding: 4px 11px;
            border-radius: 20px;
            border: 1px solid var(--gold-mid);
        }

        .res-chip:hover {
            background: var(--gold-mid);
        }


        /* --------------------------------------------------------
           UNIT BLOCK
           -------------------------------------------------------- */
        .unit-block {
            margin-bottom: 2.5rem;
        }

        /* Navy title bar — clicking opens/closes the unit */
        .unit-header {
            background: var(--navy);
            border-radius: 6px 6px 0 0;
            padding: 0.65rem 1rem;
            display: flex;
            align-items: baseline;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .unit-header:hover {
            background: #26447a;
        }

        .unit-label {
            font-size: 11px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--gold);
            white-space: nowrap;
        }

        .unit-name {
            font-size: 16px;
            font-family: Georgia, serif;
            color: white;
            font-weight: normal;
            flex: 1;
        }

        .unit-chevron {
            font-size: 15px;
            color: var(--gold);
            transition: transform 0.18s;
            flex-shrink: 0;
        }

        .unit-chevron.open {
            transform: rotate(180deg);
        }

        /* Everything inside a unit that collapses */
        .unit-collapsible {
            display: none;
        }

        .unit-collapsible.open {
            display: block;
        }

        .unit-meta {
            background: #f0f3f8;
            border-left: 1px solid #c5cfe0;
            border-right: 1px solid #c5cfe0;
            padding: 0.6rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 7px;

            font-size: 12px;
            font-family: Arial, sans-serif;
            color: var(--navy);
            text-decoration: none;
            padding: 3px 10px;
            border-radius: 20px;
            background: white;
            border: 1px solid #b8c5d8;
        }

        .unit-meta-chip:hover {
            background: #dce6f5;
        }

        .unit-meta-chip.teacher {
            color: var(--teacher-dark);
            border-color: var(--teacher-mid);
            background: var(--teacher-light);
        }

        .unit-meta-chip.teacher:hover {
            background: #c8e6c8;
        }

        /* Container for all section rows */
        .unit-body {
            border: 1px solid #c5cfe0;
            border-top: none;
            border-radius: 0 0 6px 6px;
            overflow: hidden;
        }

           SECTION ROWS
           -------------------------------------------------------- */
        .section-row {
            border-top: 1px solid var(--border);
        }

        .section-row:first-child {
            border-top: none;
        }

        .section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.55rem 1rem;
            background: var(--bg-subtle);
            cursor: pointer;
            user-select: none;
        }

        .section-head:hover {
            background: #eef1f7;
        }

        .section-num {
            font-size: 11px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            color: var(--gold);
            background: var(--navy);
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .section-title {
            font-size: 13px;
            font-family: Arial, sans-serif;
            color: var(--text);
            flex: 1;
        }

            font-size: 14px;
            color: var(--text-muted);
            transition: transform 0.18s;
            flex-shrink: 0;
        }

        .section-chevron.open {

        }

        .section-body {
            display: none;
            padding: 0.6rem 1rem 0.75rem;
            background: white;
            border-top: 1px solid var(--border);

            display: block;
        }

            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;

    // ------------------------------------------------------------
    // buildUnit(u)
    // Returns a <div class="unit-block"> DOM element for one unit.
    // ------------------------------------------------------------
    function buildUnit(u) {

        // Build meta chips — student chips in navy, teacher chips in green
        const metaHTML = u.meta
            .map(function(m) {
                const cls = m.teacher ? 'unit-meta-chip teacher' : 'unit-meta-chip';
                return (
                    '<a href="' + m.href + '" class="' + cls + '" target="_blank">' +
                        m.label +
                    '</a>'
                );
            })
            .join('\n            ');

        // Build all section rows
        const sectionsHTML = u.sections
            .map(function(sec, i) {
                return buildSection(u.id, i + 1, sec);
            })
            .join('\n');

        const block = document.createElement('div');
        block.className = 'unit-block';

        block.innerHTML =

            '<div class="unit-header" onclick="toggleUnit(this)">' +
                '<span class="unit-label">' + u.label + '</span>' +
                '<span class="unit-name">'  + u.name  + '</span>' +
                '<i class="ti ti-chevron-down unit-chevron" aria-hidden="true"></i>' +
            '</div>' +

            '<div class="unit-collapsible">' +

                '<div class="unit-meta">' +
                    metaHTML +
                '</div>' +

                '<div class="unit-body">' +
                    sectionsHTML +
                '</div>' +

            '</div>';

        return block;
    }


    // ------------------------------------------------------------
    // buildSection(unitId, index, sec)
    // Returns HTML for one section row with two button rows:
    // student resources (navy) and teacher resources (green).
    // ------------------------------------------------------------
    function buildSection(unitId, index, sec) {

        const num = unitId + '.' + index;

        // Student resource buttons
        const studentBtns = sec.studentResources
            .map(function(r) {
                return (
                    '<a href="' + r.href + '" class="r-btn ' + r.cls + '" target="_blank">' +
                        '<i class="ti ' + r.icon + '" aria-hidden="true"></i>' +
                        r.label +
                    '</a>'
                );
            })
            .join('\n                ');

        // Teacher resource buttons (green style)
        const teacherBtns = sec.teacherResources
            .map(function(r) {
                return (
                    '<a href="' + r.href + '" class="r-btn teacher" target="_blank">' +
                        '<i class="ti ' + r.icon + '" aria-hidden="true"></i>' +
                        r.label +
                    '</a>'
                );
            })
            .join('\n                ');

        return (
            '<div class="section-row">' +

                '<div class="section-head" onclick="toggleSection(this)">' +
                    '<span class="section-num">'   + num       + '</span>' +
                    '<span class="section-title">' + sec.title + '</span>' +
                    '<i class="ti ti-chevron-down section-chevron" aria-hidden="true"></i>' +
                '</div>' +

                '<div class="section-body">' +

                    '<div class="btn-row">' +
                        '<div class="btn-row-label">Student resources</div>' +
                        studentBtns +
                    '</div>' +

                    '<div class="btn-row">' +
                        '<div class="btn-row-label">Teacher resources</div>' +
                        teacherBtns +
                    '</div>' +

                '</div>' +

            '</div>'
        );
    }


    // ------------------------------------------------------------
    // toggleUnit / toggleSection
    // ------------------------------------------------------------
    function toggleUnit(header) {

        const collapsible = header.nextElementSibling;
        const chevron     = header.querySelector('.unit-chevron');

        const isOpen = collapsible.classList.toggle('open');
        chevron.classList.toggle('open', isOpen);
    }

    function toggleSection(header) {

        const body    = header.nextElementSibling;
        const chevron = header.querySelector('.section-chevron');

        const isOpen = body.classList.toggle('open');
        chevron.classList.toggle('open', isOpen);
    }


    // ------------------------------------------------------------
    // INIT — render all units into the page
    // ------------------------------------------------------------
    const container = document.getElementById('units');

    units.forEach(function(u) {
        container.appendChild(buildUnit(u));
    });


</script>

</body>
</html>
