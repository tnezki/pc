<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity 23 — Error Analysis Gallery</title>

  <!-- Shared stylesheet (must be in the same folder as this file) -->
  <link rel="stylesheet" href="activity.css">

  <!--
    MathJax — renders LaTeX math inside $...$ and $$...$$
    Config MUST come before the script tag.
    Load from jsdelivr (never Cloudflare CDN).
  -->
  <script>
    MathJax = {
      tex: {
        inlineMath:  [['$', '$']],
        displayMath: [['$$', '$$']]
      }
    };
  </script>
  <script async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
</head>

<body>

<!-- ═══════════════════════════════════════════════════════════════
     PAGE 1 — TITLE PAGE
     ═══════════════════════════════════════════════════════════════
     Change "Unit #" and "Section #" to match your current unit.
     The activity number and name are already filled in below.
     ─────────────────────────────────────────────────────────────── -->
<section class="page">

  <!-- Gold accent bar at top of page -->
  <div class="title-bar"></div>

  <!-- ── Unit / Section label ──
       Replace "Unit #" and "Section #" with the actual values.
       Example:  Unit 3 · Section 4  -->
  <div class="unit-label">Unit #&nbsp;&nbsp;·&nbsp;&nbsp;Section #</div>

  <!-- ── Large activity number ── auto-filled, do not change ── -->
  <div class="activity-number">23</div>

  <!-- ── Activity name ── auto-filled, do not change ── -->
  <h1 class="activity-name">Error Analysis Gallery</h1>

  <hr class="divider-navy">

  <!-- ══════════════════════════════════════════════════════════════
       OPTIONAL TITLE-PAGE CONTENT — add below this comment
       Examples: learning targets, vocabulary list, materials needed,
       a QR code, an intro graph or image, etc.

       Suggested elements to paste in:
         <div class="problem-box">Learning target: ...</div>
         <div class="graph-box box-quarter"><img src="..." alt=""></div>
         <div class="student-header">
           <div class="field"><label>Name</label><span class="underline"></span></div>
           <div class="field"><label>Period</label><span class="underline"></span></div>
           <div class="field"><label>Date</label><span class="underline"></span></div>
         </div>
       ══════════════════════════════════════════════════════════════ -->


  <!-- Footer with activity name (auto-filled) -->
  <div class="page-footer">
    <span>Activity 23 — Error Analysis Gallery</span>
    <span>Manistee High School</span>
  </div>

</section><!-- end PAGE 1 -->


<!-- ═══════════════════════════════════════════════════════════════
     PAGE 2 — DIRECTIONS IMAGE
     ═══════════════════════════════════════════════════════════════
     The directions image is loaded from the directions/ subfolder.
     If you rename or move the image, update the src attribute below.
     ─────────────────────────────────────────────────────────────── -->
<section class="page">

  <!-- Directions image — fills the page, preserves aspect ratio -->
  <div class="directions-page">
    <img
      src="directions/Error Analysis Gallery.png"
      alt="Error Analysis Gallery directions"
    >
  </div>

</section><!-- end PAGE 2 -->


<!-- ═══════════════════════════════════════════════════════════════
     PAGE 3+ — ADD CONTENT PAGES BELOW
     ═══════════════════════════════════════════════════════════════
     Copy the block below and paste it for each additional page.
     Common content pages:

       PROBLEMS + WORKSPACE:
         <section class="page">
           <div class="student-header"> ... </div>
           <div class="problem-box"> Problem text or $math$ here </div>
           <div class="workspace workspace-lg"></div>
           <div class="answer-box"><label>Answer:</label><span class="box"></span></div>
           <div class="page-footer"> ... </div>
         </section>

       GRAPH + WORKSPACE:
         <section class="page">
           <div class="two-col">
             <div class="graph-box box-half">
               <img src="images/my_graph.png" alt="Graph">
               (or remove the img tag and the placeholder-label div below will show)
               <span class="placeholder-label">Graph goes here</span>
             </div>
             <div class="workspace"></div>
           </div>
         </section>

       DATA TABLE:
         <section class="page">
           <table class="data-table">
             <thead><tr><th>x</th><th>f(x)</th></tr></thead>
             <tbody>
               <tr><td></td><td></td></tr>
               (add more tr/td rows as needed)
             </tbody>
           </table>
         </section>

     ═══════════════════════════════════════════════════════════════ -->

</body>
</html>
